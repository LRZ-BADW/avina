{% extends 'base.html' %}
{% load i18n horizon humanize sizeformat %}
{% block title %}{% trans "Budgeting" %}{% endblock %}

{% block page_header %}
  {% include "horizon/common/_domain_page_header.html" with title=_("Avina") %}
{% endblock page_header %}

{% block main %}

<style>
    .flex-div {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0
    }

    .flex-row-container {
        display: flex;
        width: 100%;
        height: 100%;
        flex-direction: column;
        overflow: hidden;
    }

    .flex-row {
        flex-grow: 1;
        border: none;
        margin: 0;
        padding: 0;
    }
</style>

<div class="flex-div">
    <div class="flex-row-container">
        <iframe src="{{ ui_url }}" id="frame" class="flex-row"></iframe>
    </div>
</div>

<script>
    var response = "{{ api_url }} {{ token }}";
    window.addEventListener("message", function(event) {
        if (event.data === "request") {
            document.getElementById('frame').contentWindow.postMessage(response, "*");
        }
    }, false);
</script>

{% endblock %}
