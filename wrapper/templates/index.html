<!DOCTYPE html>
<html class="flex-html">
    <head>
        <title>{{ title }}</title>
        <style>
            .flex-body, .flex-html {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0
            }

            .flex-row-container {
                display: flex;
                width: 100%;
                height: 100%;
                flex-direction: column;
                overflow: hidden;
            }

            .flex-row {
                flex-grow: 1;
                border: none;
                margin: 0;
                padding: 0;
            }
        </style>
    </head>
    <body class="flex-body">
        <div class="flex-row-container">
            <h1><center>UI Wrapper</center></h1>
            <iframe src="http://localhost:8080/" id="frame" class="flex-row"></iframe>
        </div>
        <script>
            var token = "{{ token }}";
            window.addEventListener("message", function(event) {
                if (event.data === "request-token") {
                    document.getElementById('frame').contentWindow.postMessage(token, "*");
                }
            }, false);
        </script>
    </body>
</html>
